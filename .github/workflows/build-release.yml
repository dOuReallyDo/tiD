name: Build Windows Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Release
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Package distribution
        shell: bash
        run: |
          set -euo pipefail

          # Create directory structure
          mkdir -p dist/tiD/frontend/dist
          mkdir -p dist/tiD/data/sources
          mkdir -p dist/tiD/data/inputs
          mkdir -p dist/tiD/data/exports

          # Copy executable
          cp target/x86_64-pc-windows-msvc/release/tid.exe dist/tiD/tiD.exe

          # Copy frontend (if exists)
          if [ -d "frontend/dist" ] && [ "$(ls -A frontend/dist 2>/dev/null)" ]; then
            cp -r frontend/dist/* dist/tiD/frontend/dist/
          fi

          # Copy data sources (factory Excel files)
          if [ -d "data/sources" ] && [ "$(ls -A data/sources 2>/dev/null)" ]; then
            cp -r data/sources/* dist/tiD/data/sources/
          fi

          # Copy startup batch file
          cp START_tiD.bat dist/tiD/START_tiD.bat

          # Copy readme
          cp README.md dist/tiD/README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiD-windows-x64
          path: dist/tiD/
          retention-days: 30

      - name: Create ZIP for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cd dist
          7z a -tzip tiD-${{ github.ref_name }}-windows-x64.zip tiD/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tiD-${{ github.ref_name }}-windows-x64.zip
          generate_release_notes: true